name: Azure Web App CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build (optional)
        run: echo "No build step defined" || true

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          slot-name: production
          package: .

# Notes for maintainers:
# - Create a repository secret AZURE_CREDENTIALS containing JSON for a service principal with contributor rights
#   Example: {"clientId":"...","clientSecret":"...","subscriptionId":"...","tenantId":"..."}
# - Set AZURE_WEBAPP_NAME secret to the created web app name (siteName)
# - Alternatively, you can use AZURE_WEBAPP_PUBLISH_PROFILE (base64 or xml) and the azure/webapps-deploy action
